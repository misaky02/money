<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>カード家計簿</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
  :root {
    --bg: #f5f0eb;
    --white: #ffffff;
    --pink: #ff6b9d;
    --pink-light: #ffe0ee;
    --mint: #00c896;
    --mint-light: #d0f5eb;
    --yellow: #ffd93d;
    --yellow-light: #fff8d0;
    --purple: #a78bfa;
    --purple-light: #ede9fe;
    --coral: #ff7c5c;
    --coral-light: #ffe4de;
    --blue: #4da6ff;
    --blue-light: #deedff;
    --text: #2d2d2d;
    --text2: #6b6b6b;
    --text3: #aaaaaa;
    --border: #e8e0d6;
    --shadow: 0 4px 16px rgba(0,0,0,0.08);
    --shadow-sm: 0 2px 8px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--white);
    padding: 0 32px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--pink);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo h1 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .logo h1 span { color: var(--pink); }

  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--bg);
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
  }
  .month-nav button {
    background: none; border: none; cursor: pointer;
    color: var(--text2); font-size: 17px; line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .month-nav button:hover { color: var(--pink); }
  .month-label {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    min-width: 90px;
    text-align: center;
  }

  /* LAYOUT */
  .layout {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 20px;
    padding: 20px 24px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* SIDEBAR */
  .sidebar { display: flex; flex-direction: column; gap: 14px; }

  /* CARDS */
  .card {
    background: var(--white);
    border-radius: 20px;
    padding: 18px;
    box-shadow: var(--shadow-sm);
    border: 1.5px solid var(--border);
  }
  .card-title {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--text2);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* SUMMARY STRIP */
  .summary-strip {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .sum-pill {
    background: var(--bg);
    border-radius: 12px;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-width: 0;
  }
  .sum-pill .lbl {
    font-size: 11px;
    color: var(--text3);
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .sum-pill .val {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
    line-height: 1.2;
    text-align: right;
  }
  .sum-pill.inc .val { color: var(--mint); }
  .sum-pill.exp .val { color: var(--pink); }

  /* BUDGET */
  .budget-progress {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .budget-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .budget-used { font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 18px; }
  .budget-limit { font-size: 12px; color: var(--text3); }
  .progress-track {
    height: 10px;
    background: var(--bg);
    border-radius: 6px;
    overflow: hidden;
    border: 1.5px solid var(--border);
  }
  .progress-fill {
    height: 100%;
    border-radius: 5px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.3s;
  }
  .budget-set-btn {
    background: none;
    border: 1.5px dashed var(--border);
    color: var(--text3);
    border-radius: 10px;
    padding: 7px 12px;
    font-size: 12px;
    cursor: pointer;
    width: 100%;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .budget-set-btn:hover { border-color: var(--pink); color: var(--pink); }

  .alert-pill {
    padding: 8px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    background: #fff3cd;
    color: #a06000;
    border: 1.5px solid #ffe08a;
  }
  .alert-pill.over { background: var(--pink-light); color: #c0003c; border-color: #ffb3cc; }

  /* ADD FORM */
  .type-toggle {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }
  .type-btn {
    flex: 1;
    padding: 8px;
    border-radius: 12px;
    border: 1.5px solid var(--border);
    background: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text2);
  }
  .type-btn.inc-on { background: var(--mint-light); border-color: var(--mint); color: #007a5a; }
  .type-btn.exp-on { background: var(--pink-light); border-color: var(--pink); color: #c0003c; }

  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .fg { display: flex; flex-direction: column; gap: 3px; flex: 1; }
  .fg label {
    font-size: 10px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  input, select {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 11px;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    width: 100%;
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus, select:focus { outline: none; border-color: var(--pink); }
  input::placeholder { color: var(--text3); }

  .add-btn {
    width: 100%;
    padding: 11px;
    background: var(--pink);
    color: white;
    border: none;
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.15s;
    margin-top: 4px;
  }
  .add-btn:hover { opacity: 0.88; }
  .add-btn:active { transform: scale(0.97); }

  /* DEBT SECTION */
  .debt-list { display: flex; flex-direction: column; gap: 10px; }
  .debt-item {
    background: var(--bg);
    border-radius: 14px;
    padding: 12px 14px;
    border: 1.5px solid var(--border);
  }
  .debt-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .debt-name { font-weight: 700; font-size: 13px; }
  .debt-type-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 6px;
  }
  .badge-ribo { background: var(--purple-light); color: #6d35d9; }
  .badge-cash { background: var(--coral-light); color: #b04000; }
  .debt-amounts {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 6px;
  }
  .debt-remaining {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 18px;
    color: var(--coral);
  }
  .debt-original { font-size: 11px; color: var(--text3); }
  .debt-track { height: 6px; background: var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 6px; }
  .debt-fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
  .debt-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .debt-paid { font-size: 11px; color: var(--mint); font-weight: 700; }
  .debt-pay-btn {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    color: var(--text2);
    transition: all 0.15s;
  }
  .debt-pay-btn:hover { border-color: var(--mint); color: var(--mint); }
  .debt-del-btn {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 14px; padding: 2px 5px;
    transition: color 0.15s;
  }
  .debt-del-btn:hover { color: var(--pink); }
  .debt-add-btn {
    width: 100%;
    padding: 9px;
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
  }
  .debt-add-btn:hover { border-color: var(--purple); color: var(--purple); }

  /* MAIN */
  .main-area { display: flex; flex-direction: column; gap: 14px; }
  .tab-row {
    display: flex;
    gap: 6px;
    background: var(--white);
    padding: 6px;
    border-radius: 16px;
    border: 1.5px solid var(--border);
    width: fit-content;
  }
  .tab {
    padding: 7px 20px;
    border-radius: 11px;
    border: none;
    background: none;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    color: var(--text2);
    transition: all 0.15s;
  }
  .tab.active { background: var(--pink); color: white; }

  /* TX LIST */
  .tx-list { display: flex; flex-direction: column; gap: 6px; }
  .tx-item {
    background: var(--white);
    border-radius: 16px;
    padding: 13px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    border: 1.5px solid var(--border);
    animation: popIn 0.2s cubic-bezier(.4,0,.2,1);
    transition: box-shadow 0.15s;
  }
  .tx-item:hover { box-shadow: var(--shadow); }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96) translateY(-4px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .tx-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .tx-dot.income { background: var(--mint); }
  .tx-dot.expense { background: var(--pink); }
  .tx-body { flex: 1; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .card-chip {
    font-size: 11px;
    font-weight: 700;
    padding: 3px 9px;
    border-radius: 8px;
    background: var(--yellow-light);
    color: #8a6000;
    border: 1.5px solid var(--yellow);
    flex-shrink: 0;
  }
  .tx-note-text { font-size: 13px; color: var(--text2); }
  .tx-date { font-size: 11px; color: var(--text3); font-weight: 700; flex-shrink: 0; }
  .tx-amt { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 16px; flex-shrink: 0; }
  .tx-amt.income { color: var(--mint); }
  .tx-amt.expense { color: var(--pink); }
  .tx-del {
    background: none; border: none; color: var(--text3);
    cursor: pointer; font-size: 15px; padding: 3px 5px;
    border-radius: 6px; transition: all 0.15s;
  }
  .tx-del:hover { background: var(--pink-light); color: var(--pink); }
  .tx-edit { background: none; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 3px 5px; border-radius: 6px; transition: all 0.15s; }
  .tx-edit:hover { background: var(--blue-light); color: var(--blue); }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text3);
    font-size: 14px;
    line-height: 2.2;
    background: var(--white);
    border-radius: 20px;
    border: 1.5px solid var(--border);
  }
  .empty-icon { font-size: 36px; display: block; margin-bottom: 8px; }

  /* CHARTS */
  .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .chart-card {
    background: var(--white);
    border-radius: 20px;
    padding: 18px;
    border: 1.5px solid var(--border);
  }
  .chart-card.wide { grid-column: 1 / -1; }
  .chart-card h3 {
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 12px;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 14px;
  }
  canvas { max-height: 200px; }
  .card-breakdown { display: flex; flex-direction: column; gap: 10px; }
  .cb-row { display: flex; align-items: center; gap: 10px; }
  .cb-name { font-size: 12px; color: var(--text2); font-weight: 600; width: 90px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cb-bar-wrap { flex: 1; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .cb-bar { height: 100%; border-radius: 3px; }
  .cb-amt { font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 12px; color: var(--text2); width: 65px; text-align: right; flex-shrink: 0; }

  /* MODALS */
  .overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(45,45,45,0.35);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--white);
    border-radius: 24px;
    padding: 26px 24px;
    width: 340px;
    border: 1.5px solid var(--border);
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .modal h2 {
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 20px;
    margin-bottom: 6px;
  }
  .modal p { font-size: 13px; color: var(--text2); margin-bottom: 16px; line-height: 1.6; }
  .modal-actions { display: flex; gap: 8px; margin-top: 18px; }
  .btn-cancel {
    flex: 1; padding: 10px; border-radius: 12px;
    border: 1.5px solid var(--border); background: none;
    color: var(--text2); font-family: 'Nunito', sans-serif;
    font-weight: 700; font-size: 13px; cursor: pointer;
  }
  .btn-save {
    flex: 1; padding: 10px; border-radius: 12px;
    border: none; background: var(--pink); color: white;
    font-family: 'Nunito', sans-serif; font-weight: 800;
    font-size: 13px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-save.mint { background: var(--mint); }
  .btn-save.purple { background: var(--purple); }

  .sim-modal { width: 480px; max-height: 80vh; overflow-y: auto; }
  .sim-summary { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .sim-pill { background: var(--bg); border-radius: 12px; padding: 10px 12px; text-align: center; border: 1.5px solid var(--border); }
  .sim-pill .lbl { font-size: 10px; color: var(--text3); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .sim-pill .val { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 15px; }
  .sim-table-wrap { max-height: 280px; overflow-y: auto; border: 1.5px solid var(--border); border-radius: 12px; }
  .sim-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .sim-table th { background: var(--bg); padding: 7px 10px; text-align: right; font-weight: 700; font-size: 11px; color: var(--text2); border-bottom: 1.5px solid var(--border); white-space: nowrap; position: sticky; top: 0; }
  .sim-table th:first-child { text-align: left; }
  .sim-table td { padding: 6px 10px; text-align: right; border-bottom: 1px solid var(--border); font-family: 'Nunito', sans-serif; font-weight: 600; color: var(--text2); }
  .sim-table td:first-child { text-align: left; color: var(--text3); font-weight: 700; }
  .sim-table td.interest { color: var(--coral); }
  .sim-table td.principal { color: var(--mint); }
  .sim-table tr:last-child td { background: var(--mint-light); font-weight: 800; color: var(--text); }
  .debt-sim-btn { background: var(--purple-light); border: 1.5px solid var(--purple); border-radius: 8px; padding: 4px 10px; font-size: 11px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; font-weight: 700; color: #6d35d9; transition: all 0.15s; }
  .debt-sim-btn:hover { background: var(--purple); color: white; }
  .debt-monthly { font-size: 11px; color: var(--blue); font-weight: 700; }
  .debt-rate { font-size: 11px; color: var(--coral); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">💳</div>
    <h1 style="color:#2d2d2d"><span style="color:#ff6b9d">家計簿</span></h1>
  </div>
  <div class="month-nav">
    <button onclick="changeMonth(-1)">‹</button>
    <div style="text-align:center">
      <span class="month-label" id="monthLabel"></span>
      <div id="monthSubLabel" style="font-size:10px;color:var(--text3);font-weight:600;margin-top:1px"></div>
    </div>
    <button onclick="changeMonth(1)">›</button>
  </div>
</header>

<div class="layout">
  <!-- SIDEBAR -->
  <div class="sidebar">

    <!-- SUMMARY -->
    <div class="card">
      <div class="card-title"><span class="card-title-dot" style="background:var(--yellow)"></span>今月のまとめ</div>
      <div class="summary-strip">
        <div class="sum-pill inc">
          <div class="lbl">収入</div>
          <div class="val" id="sumIncome">¥0</div>
        </div>
        <div class="sum-pill exp">
          <div class="lbl">支出</div>
          <div class="val" id="sumExpense">¥0</div>
        </div>
        <div class="sum-pill">
          <div class="lbl">収支</div>
          <div class="val" id="sumBalance">¥0</div>
        </div>
      </div>
    </div>

    <!-- ANALYSIS -->
    <div class="card" id="analysisCard">
      <div class="card-title"><span class="card-title-dot" style="background:var(--coral)"></span>ひとこと分析</div>
      <div id="analysisText" style="font-size:13px;line-height:1.7;color:var(--text2);min-height:40px">
        <span style="color:var(--text3)">記録を追加すると分析が表示されます</span>
      </div>
      <button class="budget-set-btn" style="margin-top:10px" onclick="runAnalysis()">🔍 分析する</button>
    </div>

    <!-- ADD FORM -->
    <div class="card">
      <div class="card-title"><span class="card-title-dot" style="background:var(--blue)"></span>記録を追加</div>
      <div class="type-toggle">
        <button class="type-btn" id="btnInc" onclick="setType('income')">収入</button>
        <button class="type-btn" id="btnExp" onclick="setType('expense')">支出</button>
      </div>
      <div class="form-row">
        <div class="fg" style="flex:0 0 110px">
          <label>日付</label>
          <input type="date" id="txDate">
        </div>
        <div class="fg">
          <label>金額 ¥</label>
          <input type="number" id="txAmt" placeholder="0" min="0">
        </div>
      </div>
      <div class="fg" style="margin-bottom:8px" id="fieldCard">
        <label>カード</label>
        <select id="txCard">
          <option>アプラス</option>
          <option>JCB</option>
          <option>メルカリ</option>
          <option>Yahoo</option>
          <option>Amazon</option>
          <option>au</option>
          <option>Paidy</option>
          <option>セブン</option>
          <option>楽天</option>
          <option>西日本シティ銀行</option>
          <option>奨学金</option>
          <option>自転車</option>
          <option>その他</option>
        </select>
      </div>
      <div class="fg" style="margin-bottom:8px;display:none" id="fieldSource">
        <label>収入元</label>
        <input type="text" id="txSource" placeholder="例：給与、フリーランス、副業…">
      </div>
      <div class="fg" style="margin-bottom:8px">
        <label>メモ（任意）</label>
        <input type="text" id="txNote" placeholder="例：Amazon、Netflix…">
      </div>
      <button class="add-btn" onclick="addTx()">＋ 追加する</button>
    </div>

  </div>

  <!-- MAIN -->
  <div class="main-area">
    <div class="tab-row">
      <button class="tab active" onclick="switchTab('list', this)">明細</button>
      <button class="tab" onclick="switchTab('chart', this)">グラフ</button>

<script>
// 16日以降は当月分、1〜15日は前月分として表示
const _today = new Date();
let year = _today.getDate() <= 15 ? (_today.getMonth() === 0 ? _today.getFullYear() - 1 : _today.getFullYear()) : _today.getFullYear();
let month = _today.getDate() <= 15 ? (_today.getMonth() === 0 ? 11 : _today.getMonth() - 1) : _today.getMonth();
let txType = 'expense';
let tab = 'list';
let txs = [];
let budget = 0;
let debts = [];
let assets = {
  accounts: [
    { id: 1, name: '西日本シティ銀行', balance: 0, note: '' },
    { id: 2, name: 'その他口座', balance: 0, note: '' },
  ],
  cash: 0,
  securities: [
    { id: 1, name: '楽天証券', balance: 0, note: '' },
  ]
};
let cardAccountMap = {
  'アプラス': null, 'JCB': null, 'メルカリ': null, 'Yahoo': null,
  'Amazon': null, 'au': null, 'Paidy': null, 'セブン': null, '楽天': null, '西日本シティ銀行': null, '奨学金': null, '自転車': null, 'その他': null
};
let payingDebtId = null;

const CARD_COLORS = ['#ff6b9d','#4da6ff','#ffd93d','#00c896','#a78bfa','#ff7c5c'];

function fmt(n) { return '¥' + Math.abs(Math.round(n)).toLocaleString('ja-JP'); }

const LS_KEY = 'kakeibo_v1';
function saveData() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify({ txs, budget, debts, assets, cardAccountMap }));
  } catch(e) {}
}
function loadData() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.txs) txs = d.txs;
    if (d.budget != null) budget = d.budget;
    if (d.debts) debts = d.debts;
    if (d.assets) assets = d.assets;
    if (d.cardAccountMap) cardAccountMap = { ...cardAccountMap, ...d.cardAccountMap };
  } catch(e) {}
}

window.onload = () => {
  loadData();
  document.getElementById('txDate').value = new Date().toISOString().split('T')[0];
  setType('expense');
  updateLabel();
  // 明細タブを確実に初期化
  tab = 'list';
  document.getElementById('mainContent').innerHTML = '<div class="tx-list" id="txList"></div>';
  render();
};

function changeMonth(d) {
  month += d;
  if (month > 11) { month = 0; year++; }
  if (month < 0) { month = 11; year--; }
  updateLabel();
  render();
}
function updateLabel() {
  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('monthLabel').textContent = `${year}年${months[month]}`;
  // 集計期間表示
  const s = periodStart(year, month);
  const e = periodEnd(year, month);
  const sub = `${s.getMonth()+1}/${s.getDate()}〜${e.getMonth()+1}/${e.getDate()}`;
  const subEl = document.getElementById('monthSubLabel');
  if (subEl) subEl.textContent = sub;
}
function setType(t) {
  txType = t;
  document.getElementById('btnInc').className = 'type-btn' + (t === 'income' ? ' inc-on' : '');
  document.getElementById('btnExp').className = 'type-btn' + (t === 'expense' ? ' exp-on' : '');
  document.getElementById('fieldCard').style.display = t === 'expense' ? '' : 'none';
  document.getElementById('fieldSource').style.display = t === 'income' ? '' : 'none';
}
// 月の集計期間: M月16日〜(M+1)月15日を「M月分」とする
// 例: 3月分 = 3/16〜4/15
function periodStart(y, m) {
  return new Date(y, m, 16); // M月16日
}
function periodEnd(y, m) {
  return new Date(y, m + 1, 15); // (M+1)月15日
}
function monthTxs() {
  const start = periodStart(year, month);
  const end = periodEnd(year, month);
  return txs.filter(t => {
    const d = new Date(t.date);
    return d >= start && d <= end;
  });
}

function addTx() {
  const date = document.getElementById('txDate').value;
  const amount = parseFloat(document.getElementById('txAmt').value);
  const card = txType === 'expense' ? document.getElementById('txCard').value : (document.getElementById('txSource').value.trim() || '収入');
  const note = document.getElementById('txNote').value.trim();
  if (!date || isNaN(amount) || amount <= 0) {
    const el = document.getElementById('txAmt');
    el.style.borderColor = 'var(--pink)';
    el.style.background = 'var(--pink-light)';
    setTimeout(() => { el.style.borderColor = ''; el.style.background = ''; }, 800);
    return;
  }
  txs.unshift({ id: Date.now(), date, type: txType, amount, card, note });
  // カード引落：紐づき口座から自動減算
  if (txType === 'expense') {
    const accountId = cardAccountMap[card];
    if (accountId) {
      const acc = assets.accounts.find(a => a.id === accountId);
      if (acc) acc.balance = Math.max(0, acc.balance - amount);
    }
  }
  document.getElementById('txAmt').value = '';
  document.getElementById('txNote').value = '';
  if (txType === 'income') document.getElementById('txSource').value = '';
  saveData();
  render();
}
function deleteTx(id) { txs = txs.filter(t => t.id !== id); saveData(); render(); }

function render() {
  renderSummary();
  renderBudget();
  renderDebts();
  if (tab === 'list') renderList();
  else if (tab === 'chart') renderChart();
  else if (tab === 'yearly') renderYearlyTab();
  else if (tab === 'debt') renderDebtTab();
  else if (tab === 'assets') renderAssetTab();
}

function renderSummary() {
  const list = monthTxs();
  const inc = list.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const exp = list.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const bal = inc - exp;
  document.getElementById('sumIncome').textContent = fmt(inc);
  document.getElementById('sumExpense').textContent = fmt(exp);
  const el = document.getElementById('sumBalance');
  el.textContent = (bal >= 0 ? '+' : '-') + fmt(bal);
  el.style.color = bal >= 0 ? 'var(--mint)' : 'var(--pink)';
}

function renderBudget() { /* 月間予算セクション削除済 */ }

function renderDebts() { /* サイドバー削除済 - renderDebtTab を使用 */ }

function renderList() {
  const list = monthTxs().sort((a, b) => new Date(b.date) - new Date(a.date));
  const el = document.getElementById('txList');
  if (!el) return;
  if (!list.length) {
    el.innerHTML = `<div class="empty"><span class="empty-icon">📋</span>この月の記録はありません<br><span style="font-size:12px">左のフォームから追加しましょう</span></div>`;
    return;
  }
  el.innerHTML = list.map(t => {
    const d = new Date(t.date);
    const ds = `${d.getMonth()+1}/${d.getDate()}`;
    const sign = t.type === 'income' ? '+' : '-';
    return `<div class="tx-item">
      <div class="tx-dot ${t.type}"></div>
      <div class="tx-body">
        <span class="card-chip">${t.card}</span>
        ${t.note ? `<span class="tx-note-text">${t.note}</span>` : ''}
      </div>
      <span class="tx-date">${ds}</span>
      <span class="tx-amt ${t.type}">${sign}${fmt(t.amount)}</span>
      <button class="tx-edit" onclick="openEditModal(${t.id})" title="編集">✎</button>
      <button class="tx-del" onclick="deleteTx(${t.id})">×</button>
    </div>`;
  }).join('');
}

let chartObjs = [];
function destroyCharts() { chartObjs.forEach(c => c.destroy()); chartObjs = []; }

function renderChart() {
  destroyCharts();
  const list = monthTxs();
  const exp = list.filter(t => t.type === 'expense');
  const cardMap = {};
  exp.forEach(t => { cardMap[t.card] = (cardMap[t.card] || 0) + t.amount; });
  const cards = Object.keys(cardMap);
  const total = cards.reduce((s, c) => s + cardMap[c], 0);
  const days = new Date(year, month + 1, 0).getDate();
  const dailyExp = Array(days).fill(0);
  const dailyInc = Array(days).fill(0);
  list.forEach(t => {
    const d = new Date(t.date).getDate() - 1;
    if (t.type === 'expense') dailyExp[d] += t.amount;
    else dailyInc[d] += t.amount;
  });
  let cum = 0;
  const cumData = dailyExp.map(v => { cum += v; return cum; });

  const content = document.getElementById('mainContent');
  content.innerHTML = `<div class="chart-grid">
    <div class="chart-card"><h3>💳 カード別支出</h3><div class="card-breakdown" id="cbArea"></div></div>
    <div class="chart-card"><h3>📊 日別収支</h3><canvas id="dayChart"></canvas></div>
    <div class="chart-card wide"><h3>📈 累積支出</h3><canvas id="cumChart"></canvas></div>
  </div>`;

  const cb = document.getElementById('cbArea');
  if (!cards.length) { cb.innerHTML = '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">支出なし</div>'; }
  else {
    cb.innerHTML = cards.map((c, i) => {
      const pct = total ? Math.round((cardMap[c] / total) * 100) : 0;
      return `<div class="cb-row">
        <span class="cb-name" title="${c}">${c}</span>
        <div class="cb-bar-wrap"><div class="cb-bar" style="width:${pct}%;background:${CARD_COLORS[i%CARD_COLORS.length]}"></div></div>
        <span class="cb-amt">${fmt(cardMap[c])}</span>
      </div>`;
    }).join('');
  }

  const scOpts = {
    x: { ticks: { color: '#aaaaaa', font: { size: 10 } }, grid: { color: '#f0e8e0' } },
    y: { ticks: { color: '#aaaaaa', font: { size: 10 }, callback: v => '¥' + v.toLocaleString() }, grid: { color: '#f0e8e0' } }
  };
  const legOpts = { labels: { color: '#6b6b6b', font: { size: 11 }, boxWidth: 10, boxHeight: 10 } };
  const labels = Array.from({ length: days }, (_, i) => i + 1);

  chartObjs.push(new Chart(document.getElementById('dayChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: '支出', data: dailyExp, backgroundColor: 'rgba(255,107,157,0.65)', borderRadius: 4 },
        { label: '収入', data: dailyInc, backgroundColor: 'rgba(0,200,150,0.55)', borderRadius: 4 }
      ]
    },
    options: { scales: scOpts, plugins: { legend: legOpts } }
  }));

  chartObjs.push(new Chart(document.getElementById('cumChart'), {
    type: 'line',
    data: {
      labels: labels.map(n => `${n}日`),
      datasets: [{
        label: '累積支出',
        data: cumData,
        borderColor: '#ff6b9d',
        backgroundColor: 'rgba(255,107,157,0.07)',
        fill: true, tension: 0.4, pointRadius: 2, pointHoverRadius: 5
      }]
    },
    options: { scales: scOpts, plugins: { legend: legOpts } }
  }));
}

function renderYearlyTab() {
  destroyCharts();
  const content = document.getElementById('mainContent');
  const months = Array.from({length: 12}, (_, i) => i);
  const labels = months.map(m => `${m+1}月`);

  const monthlyInc  = months.map(m => txs.filter(t => { const d = new Date(t.date); const s=periodStart(selectedYear,m),e=periodEnd(selectedYear,m); return d>=s&&d<=e && t.type==='income'; }).reduce((s,t)=>s+t.amount,0));
  const monthlyExp  = months.map(m => txs.filter(t => { const d = new Date(t.date); const s=periodStart(selectedYear,m),e=periodEnd(selectedYear,m); return d>=s&&d<=e && t.type==='expense'; }).reduce((s,t)=>s+t.amount,0));
  const monthlyBal  = months.map((_, i) => monthlyInc[i] - monthlyExp[i]);

  const totalInc = monthlyInc.reduce((s,v)=>s+v,0);
  const totalExp = monthlyExp.reduce((s,v)=>s+v,0);
  const totalBal = totalInc - totalExp;
  const avgExp   = Math.round(totalExp / 12);

  // カード別年間集計
  const cardMap = {};
  txs.filter(t => { const d=new Date(t.date); const s=new Date(selectedYear-1,11,16),e=new Date(selectedYear,11,15); return d>=s&&d<=e && t.type==='expense'; })
     .forEach(t => { cardMap[t.card] = (cardMap[t.card]||0) + t.amount; });
  const cards = Object.entries(cardMap).sort((a,b)=>b[1]-a[1]);
  const CARD_COLORS2 = ['#ff6b9d','#4da6ff','#ffd93d','#00c896','#a78bfa','#ff7c5c','#00ddff','#ff9944'];

  content.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px">
      <div style="background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">年間収入</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--mint)">${fmt(totalInc)}</div>
      </div>
      <div style="background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">年間支出</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--pink)">${fmt(totalExp)}</div>
      </div>
      <div style="background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">年間収支</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:${totalBal>=0?'var(--mint)':'var(--pink)'}">${totalBal>=0?'+':''}${fmt(totalBal)}</div>
      </div>
      <div style="background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">月平均支出</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--coral)">${fmt(avgExp)}</div>
      </div>
    </div>
    <div class="chart-grid">
      <div class="chart-card wide"><h3>📊 月別収支</h3><canvas id="yearBarChart" style="max-height:220px"></canvas></div>
      <div class="chart-card wide"><h3>📈 累積収支推移</h3><canvas id="yearLineChart" style="max-height:180px"></canvas></div>
      <div class="chart-card">
        <h3>💳 カード別年間支出</h3>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${cards.length ? cards.map(([card, amt], i) => {
            const pct = totalExp ? Math.round((amt/totalExp)*100) : 0;
            return `<div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:12px;font-weight:600;color:var(--text2);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${card}</span>
              <div style="flex:1;height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:${CARD_COLORS2[i%CARD_COLORS2.length]};border-radius:3px"></div></div>
              <span style="font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;color:var(--text2);width:65px;text-align:right;flex-shrink:0">${fmt(amt)}</span>

                <td style="padding:5px 4px;border-bottom:1px solid var(--border);text-align:right;font-family:'Nunito',sans-serif;font-weight:700;color:var(--pink)">${monthlyExp[m]?fmt(monthlyExp[m]):'-'}</td>
                <td style="padding:5px 4px;border-bottom:1px solid var(--border);text-align:right;font-family:'Nunito',sans-serif;font-weight:800;color:${bal>=0?'var(--mint)':'var(--pink)'}">${hasData?(bal>=0?'+':'')+fmt(bal):'-'}</td>

  const scOpts = {
    x: { ticks: { color: '#aaaaaa', font:{size:10} }, grid:{color:'#f0e8e0'} },
    y: { ticks: { color: '#aaaaaa', font:{size:10}, callback: v=>'¥'+v.toLocaleString() }, grid:{color:'#f0e8e0'} }
  };
  const legOpts = { labels: { color:'#6b6b6b', font:{size:11}, boxWidth:10, boxHeight:10 } };

  chartObjs.push(new Chart(document.getElementById('yearBarChart'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label:'収入', data:monthlyInc, backgroundColor:'rgba(0,200,150,0.55)', borderRadius:4 },
        { label:'支出', data:monthlyExp, backgroundColor:'rgba(255,107,157,0.65)', borderRadius:4 },
      ]
    },
    options: { scales: scOpts, plugins:{ legend: legOpts } }
  }));

  let cumBal = 0;
  const cumData = months.map(m => { cumBal += monthlyBal[m]; return cumBal; });
  chartObjs.push(new Chart(document.getElementById('yearLineChart'), {
    type: 'line',
    data: {

      datasets: [{
        label:'累積収支',

function switchTab(t, btn) {
  tab = t;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  destroyCharts();
  if (t === 'list') {
    document.getElementById('mainContent').innerHTML = '<div class="tx-list" id="txList"></div>';
    renderList();
  } else if (t === 'chart') {
    document.getElementById('mainContent').innerHTML = '';
    renderChart();
  } else if (t === 'yearly') {
    document.getElementById('mainContent').innerHTML = '';
    renderYearlyTab();
  } else if (t === 'debt') {
    document.getElementById('mainContent').innerHTML = '';
    renderDebtTab();
  } else if (t === 'assets') {
    document.getElementById('mainContent').innerHTML = '';
    renderAssetTab();

}

// ANALYSIS
async function runAnalysis() {
  const list = monthTxs();
  if (!list.length) { document.getElementById('analysisText').innerHTML = '<span style="color:var(--text3)">この月の記録がありません</span>'; return; }
  const inc = list.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const exp = list.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  const cardMap = {};
  list.filter(t => t.type === 'expense').forEach(t => { cardMap[t.card] = (cardMap[t.card] || 0) + t.amount; });
  const debtTotal = debts.reduce((s, d) => s + d.remaining, 0);
  const debtMonthly = debts.reduce((s, d) => s + (d.monthly || 0), 0);
  const summary = `収入:${inc}円, 支出:${exp}円, 収支:${inc-exp}円, カード別支出:${JSON.stringify(cardMap)}, リボ・キャッシング残高合計:${debtTotal}円, 月次返済額:${debtMonthly}円`;

  const el = document.getElementById('analysisText');
  el.innerHTML = '<span style="color:var(--text3)">分析中…</span>';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'あなたは厳しいが的確な家計アドバイザーです。データを見て、甘やかさず、でも建設的に、3〜4文で辛口ひとこと分析をしてください。具体的な数字を引用し、改善点を明確に。絵文字は1〜2個まで。',
        messages: [{ role: 'user', content: `今月の家計データ: ${summary}` }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'エラーが発生しました';
    el.innerHTML = `<span style="color:var(--text);font-size:13px;line-height:1.8">${text.replace(/\n/g, '<br>')}</span>`;
  } catch(e) {
    el.innerHTML = '<span style="color:var(--coral)">取得に失敗しました。再試行してください。</span>';
  }
}

function calcSlidePayment(remaining) {
  if (remaining <= 50000) return 3000;
  if (remaining <= 100000) return 5000;
  if (remaining <= 150000) return 7000;
  if (remaining <= 200000) return 9000;
  if (remaining <= 300000) return 12000;
  if (remaining <= 500000) return 16000;
  return Math.ceil(remaining / 30000) * 1000;
}

function renderDebtTab() {
  const content = document.getElementById('mainContent');
  const riboList = debts.filter(d => d.type === 'ribo');
  const cashList = debts.filter(d => d.type === 'cash');
  const riboTotal = riboList.reduce((s, d) => s + d.remaining, 0);
  const cashTotal = cashList.reduce((s, d) => s + d.remaining, 0);
  const totalDebt = riboTotal + cashTotal;
  const totalMonthly = debts.reduce((s, d) => {
    if (!d.rate) return s;
    return s + (d.payMethod === 'slide' ? calcSlidePayment(d.remaining) : (d.monthly || 0));
  }, 0);
  const calcCompletion = (d) => {
    if (!d.rate) return null;
    const monthlyRate = d.rate / 100 / 12;
    let remaining = d.remaining;
    let months = 0;
    while (remaining > 0 && months < 600) {
      months++;
      const payment = d.payMethod === 'slide' ? calcSlidePayment(remaining) : (d.monthly || 0);
      const interest = Math.round(remaining * monthlyRate);
      const principal = Math.min(Math.max(0, Math.round(payment - interest)), remaining);
      if (principal <= 0) break;
      remaining = Math.max(0, remaining - principal);
      if (remaining === 0) break;
    }
    if (months >= 600) return null;
    const finishDate = new Date();
    finishDate.setMonth(finishDate.getMonth() + months);
    const today = new Date();
    const diffDays = Math.ceil((finishDate - today) / (1000 * 60 * 60 * 24));
    return { months, finishDate, diffDays };
  };

  const makeCards = (list) => list.map(d => {
    const paid = d.original - d.remaining;
    const pct = d.original > 0 ? Math.round((paid / d.original) * 100) : 0;
    const col = d.type === 'ribo' ? '#a78bfa' : '#ff7c5c';
    const curM = d.payMethod === 'slide' ? calcSlidePayment(d.remaining) : (d.monthly || 0);
    const comp = calcCompletion(d);
    const urgencyColor = comp ? (comp.months <= 3 ? 'var(--mint)' : comp.months <= 12 ? 'var(--blue)' : 'var(--coral)') : 'var(--text3)';
    const finishStr = comp ? `${comp.finishDate.getFullYear()}年${comp.finishDate.getMonth()+1}月` : null;
    return `<div style="background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-weight:700;font-size:13px">${d.card}</span>
        <div style="display:flex;gap:5px">
          ${d.rate ? `<button class="debt-sim-btn" onclick="openSimModal(${d.id})">シミュ</button>` : ''}
          <button class="debt-pay-btn" onclick="openPayModal(${d.id})">返済記録</button>
        </div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:${col}">${fmt(d.remaining)}</span>
        <div style="text-align:right;font-size:11px;color:var(--text3)">
          <div>元 ${fmt(d.original)}</div>
          ${d.rate ? `<div style="color:var(--coral)">年利 ${d.rate}%</div>` : ''}
          ${curM ? `<div style="color:var(--blue)">月 ${fmt(curM)}${d.payMethod==='slide'?' (スライド)':''}</div>` : ''}
        </div>
      </div>
      <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:6px">
        <div style="height:100%;width:${pct}%;background:${col};border-radius:3px"></div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;color:var(--mint);font-weight:700">返済済 ${pct}%</span>
        ${comp ? `<div style="background:var(--white);border:1.5px solid var(--border);border-radius:8px;padding:5px 10px;text-align:center">
          <div style="font-size:10px;color:var(--text3);font-weight:700;margin-bottom:1px">完済まで</div>
          <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;color:${urgencyColor};line-height:1.1">${comp.months}ヶ月</div>
          <div style="font-size:10px;color:var(--text3)">${finishStr}（あと${comp.diffDays}日）</div>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
  const allComps = debts.map(d => calcCompletion(d)).filter(Boolean);
  const maxMonths = allComps.length ? Math.max(...allComps.map(c => c.months)) : null;
  const latestFinish = maxMonths ? (() => { const dt = new Date(); dt.setMonth(dt.getMonth() + maxMonths); return `${dt.getFullYear()}年${dt.getMonth()+1}月`; })() : null;

  content.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr) auto;gap:10px;margin-bottom:14px;align-items:center">
      <div style="background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">残高合計</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:var(--coral)">${fmt(totalDebt)}</div>
      </div>
      <div style="background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">今月の返済計</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:18px;color:var(--purple)">${fmt(totalMonthly)}</div>
      </div>
      <div style="background:var(--white);border:1.5px solid ${latestFinish?'var(--mint)':'var(--border)'};border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">全件完済予定</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:${latestFinish?'14':'18'}px;color:var(--mint)">${latestFinish || (debts.length ? '—' : 'なし')}</div>
        ${maxMonths ? `<div style="font-size:10px;color:var(--text3)">あと${maxMonths}ヶ月</div>` : ''}
      </div>
      <button class="add-btn" style="white-space:nowrap;padding:10px 16px" onclick="openDebtModal()">＋ 追加</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="chart-card"><h3>🔄 リボ払い（${fmt(riboTotal)}）</h3>${riboList.length ? makeCards(riboList) : '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">なし</div>'}</div>
      <div class="chart-card"><h3>💸 キャッシング（${fmt(cashTotal)}）</h3>${cashList.length ? makeCards(cashList) : '<div style="color:var(--text3);font-size:12px;text-align:center;padding:20px">なし</div>'}</div>
    </div>`;
}

// PAY MODAL
function openPayModal(id) {
  payingDebtId = id;
  const d = debts.find(d => d.id === id);
  const suggested = d.payMethod === 'slide' ? calcSlidePayment(d.remaining) : (d.monthly || 0);
  document.getElementById('payModalDesc').textContent = `${d.card}（${d.type === 'ribo' ? 'リボ' : 'キャッシング'}）残高: ${fmt(d.remaining)}`;
  document.getElementById('payAmt').value = suggested || '';
  document.getElementById('payOverlay').classList.add('open');
}
function closePayModal() { document.getElementById('payOverlay').classList.remove('open'); payingDebtId = null; }
function recordPayment() {
  const amt = parseFloat(document.getElementById('payAmt').value);
  if (isNaN(amt) || amt <= 0) return;
  const d = debts.find(d => d.id === payingDebtId);
  if (d) d.remaining = Math.max(0, d.remaining - amt);
  closePayModal();
  saveData();
  renderDebts();
  if (tab === 'debt') renderDebtTab();
}

// SIMULATION
function openSimModal(id) {
  const d = debts.find(d => d.id === id);
  if (!d) return;
  const monthlyRate = d.rate / 100 / 12;
  let remaining = d.remaining;
  const rows = [];
  let totalInterest = 0;
  let months = 0;
  while (remaining > 0 && months < 600) {
    months++;
    const payment = d.payMethod === 'slide' ? calcSlidePayment(remaining) : d.monthly;
    const interest = Math.round(remaining * monthlyRate);
    const principal = Math.min(Math.max(0, Math.round(payment - interest)), remaining);
    if (principal <= 0) { rows.push({ month: months, payment, interest, principal: 0, remaining }); break; }
    remaining = Math.max(0, remaining - principal);
    totalInterest += interest;
    rows.push({ month: months, payment: principal + interest, interest, principal, remaining });
    if (remaining === 0) break;
  }
  const totalPay = rows.reduce((s, r) => s + r.payment, 0);
  document.getElementById('simSummary').innerHTML = `
    <div class="sim-pill"><div class="lbl">完済まで</div><div class="val" style="color:var(--purple)">${months}ヶ月</div></div>
    <div class="sim-pill"><div class="lbl">総支払額</div><div class="val" style="color:var(--pink)">${fmt(totalPay)}</div></div>
    <div class="sim-pill"><div class="lbl">総利息</div><div class="val" style="color:var(--coral)">${fmt(totalInterest)}</div></div>
  `;
  document.getElementById('simTableBody').innerHTML = rows.map((r, i) => {
    const dt = new Date(); dt.setMonth(dt.getMonth() + i + 1);
    return `<tr${r.remaining === 0 ? ' class="highlight"' : ''}>
      <td>${dt.getMonth()+1}月</td><td>${fmt(r.payment)}</td>
      <td class="interest">${fmt(r.interest)}</td><td class="principal">${fmt(r.principal)}</td>
      <td>${fmt(r.remaining)}</td></tr>`;
  }).join('');
  document.getElementById('simOverlay').classList.add('open');
}
function closeSimModal() { document.getElementById('simOverlay').classList.remove('open'); }

// TX EDIT MODAL
let editingTxId = null;
function openEditModal(id) {
  const t = txs.find(t => t.id === id);
  if (!t) return;
  editingTxId = id;
  document.getElementById('editDate').value = t.date;
  document.getElementById('editAmt').value = t.amount;
  document.getElementById('editNote').value = t.note || '';
  setEditType(t.type);
  if (t.type === 'income') {
    document.getElementById('editSource').value = t.card;
  } else {
    document.getElementById('editCard').value = t.card;
  }
  document.getElementById('editOverlay').classList.add('open');
}
function setEditType(t) {
  document.getElementById('editBtnInc').className = 'type-btn' + (t === 'income' ? ' inc-on' : '');
  document.getElementById('editBtnExp').className = 'type-btn' + (t === 'expense' ? ' exp-on' : '');
  document.getElementById('editFieldCard').style.display = t === 'expense' ? '' : 'none';
  document.getElementById('editFieldSource').style.display = t === 'income' ? '' : 'none';
  document.getElementById('editBtnInc').dataset.type = 'income';
  document.getElementById('editBtnExp').dataset.type = 'expense';
  document.getElementById('editOverlay').dataset.editType = t;
}
function closeEditModal() { document.getElementById('editOverlay').classList.remove('open'); editingTxId = null; }
function saveEdit() {
  const t = txs.find(t => t.id === editingTxId);
  if (!t) return;
  const editType = document.getElementById('editOverlay').dataset.editType;
  const date = document.getElementById('editDate').value;
  const amount = parseFloat(document.getElementById('editAmt').value);
  const card = editType === 'income'
    ? (document.getElementById('editSource').value.trim() || '収入')
    : document.getElementById('editCard').value;
  const note = document.getElementById('editNote').value.trim();
  if (!date || isNaN(amount) || amount <= 0) return;
  t.date = date;
  t.amount = amount;
  t.type = editType;
  t.card = card;
  t.note = note;
  closeEditModal();
  saveData();
  render();
}

// TX EDIT MODAL - click outside
document.getElementById('editOverlay').addEventListener('click', function(e) { if (e.target === this) closeEditModal(); });

// Click outside to close other overlays
['budgetOverlay','debtOverlay','payOverlay','simOverlay','assetOverlay'].forEach(id => {
  document.getElementById(id).addEventListener('click', function(e) { if (e.target === this) this.classList.remove('open'); });
});

let editingAsset = null;

function renderAssetTab() {
  const content = document.getElementById('mainContent');
  const accountTotal = assets.accounts.reduce((s, a) => s + a.balance, 0);
  const secTotal = assets.securities.reduce((s, a) => s + a.balance, 0);
  const debtTotal = debts.reduce((s, d) => s + d.remaining, 0);
  const netAssets = accountTotal + assets.cash + secTotal - debtTotal;

  const accountRows = assets.accounts.map(a => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:13px;font-weight:600">${a.name}</div>
        ${a.note ? `<div style="font-size:11px;color:var(--text3)">${a.note}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;color:var(--blue)">${fmt(a.balance)}</span>
        <button class="debt-pay-btn" onclick="openAssetModal('account',${a.id})">更新</button>
      </div>
    </div>`).join('');

  const secRows = assets.securities.map(a => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:13px;font-weight:600">${a.name}</div>
        ${a.note ? `<div style="font-size:11px;color:var(--text3)">${a.note}</div>` : ''}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:17px;color:var(--mint)">${fmt(a.balance)}</span>
        <button class="debt-pay-btn" onclick="openAssetModal('security',${a.id})">更新</button>
      </div>
    </div>`).join('');

  const netColor = netAssets >= 0 ? 'var(--mint)' : 'var(--pink)';

  content.innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
      <div style="background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">口座合計</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--blue)">${fmt(accountTotal)}</div>
      </div>
      <div style="background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">手持ち現金</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--yellow)">${fmt(assets.cash)}</div>
      </div>
      <div style="background:var(--white);border:1.5px solid var(--border);border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">証券</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:var(--mint)">${fmt(secTotal)}</div>
      </div>
      <div style="background:var(--white);border:2px solid ${netAssets>=0?'var(--mint)':'var(--pink)'};border-radius:14px;padding:12px;text-align:center">
        <div style="font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">純資産</div>
        <div style="font-family:'Nunito',sans-serif;font-weight:900;font-size:16px;color:${netColor}">${netAssets>=0?'+':''}${fmt(netAssets)}</div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
      <div class="chart-card" style="grid-column:1/-1">
        <h3>🏦 口座残高</h3>
        ${accountRows}
        <button class="debt-add-btn" style="margin-top:10px" onclick="openAssetModal('newaccount')">＋ 口座を追加</button>
      </div>
      <div class="chart-card">
        <h3>💴 手持ち現金</h3>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0">
          <span style="font-family:'Nunito',sans-serif;font-weight:900;font-size:26px;color:var(--yellow)">${fmt(assets.cash)}</span>
          <button class="debt-pay-btn" onclick="openAssetModal('cash')">更新</button>
        </div>
      </div>
      <div class="chart-card">
        <h3>📈 証券残高</h3>
        ${secRows}
        <button class="debt-add-btn" style="margin-top:10px" onclick="openAssetModal('newsecurity')">＋ 証券口座を追加</button>
      </div>
      <div class="chart-card" style="grid-column:1/-1">
        <h3>🔗 カード引落設定</h3>
        <p style="font-size:12px;color:var(--text3);margin-bottom:12px">支出追加時に、指定した口座から自動で引き落とします。</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
          ${Object.keys(cardAccountMap).map(card => `
            <div style="display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:8px 12px">
              <span style="font-size:12px;font-weight:700;flex:1">${card}</span>
              <select onchange="setCardAccount('${card}', this.value)" style="font-size:11px;padding:4px 6px;border-radius:7px;flex:1">
                <option value="">引落なし</option>
                ${assets.accounts.map(a => `<option value="${a.id}" ${cardAccountMap[card]==a.id?'selected':''}>${a.name}</option>`).join('')}
              </select>
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

let assetEditTarget = null;
function setCardAccount(card, accountId) {
  cardAccountMap[card] = accountId ? parseInt(accountId) : null;
  saveData();
}
function openAssetModal(type, id) {
  assetEditTarget = { type, id };
  const modal = document.getElementById('assetOverlay');
  const titleEl = document.getElementById('assetModalTitle');
  const descEl = document.getElementById('assetModalDesc');
  const labelEl = document.getElementById('assetModalLabel');
  const noteWrap = document.getElementById('assetNoteWrap');
  document.getElementById('assetInput').value = '';
  document.getElementById('assetNote').value = '';
  noteWrap.style.display = '';

  if (type === 'cash') {
    titleEl.textContent = '手持ち現金を更新 💴';
    descEl.textContent = `現在: ${fmt(assets.cash)}`;
    labelEl.textContent = '現金残高 ¥';
    noteWrap.style.display = 'none';
    document.getElementById('assetInput').value = assets.cash || '';
  } else if (type === 'account') {
    const a = assets.accounts.find(a => a.id === id);
    titleEl.textContent = `${a.name}を更新 🏦`;
    descEl.textContent = `現在: ${fmt(a.balance)}`;
    labelEl.textContent = '口座残高 ¥';
    document.getElementById('assetInput').value = a.balance || '';
    document.getElementById('assetNote').value = a.note || '';
  } else if (type === 'security') {
    const a = assets.securities.find(a => a.id === id);
    titleEl.textContent = `${a.name}を更新 📈`;
    descEl.textContent = `現在: ${fmt(a.balance)}`;
    labelEl.textContent = '評価額 ¥';
    document.getElementById('assetInput').value = a.balance || '';
    document.getElementById('assetNote').value = a.note || '';
  } else if (type === 'newaccount') {
    titleEl.textContent = '口座を追加 🏦';
    descEl.textContent = '新しい口座を追加します';
    labelEl.textContent = '口座残高 ¥';
    document.getElementById('assetNoteWrap').querySelector('label').textContent = '口座名';
    document.getElementById('assetNote').placeholder = '例：PayPay銀行、ゆうちょ';
  } else if (type === 'newsecurity') {
    titleEl.textContent = '証券口座を追加 📈';
    descEl.textContent = '新しい証券口座を追加します';
    labelEl.textContent = '評価額 ¥';
    document.getElementById('assetNoteWrap').querySelector('label').textContent = '証券会社名';
    document.getElementById('assetNote').placeholder = '例：SBI証券、マネックス';
  }
  modal.classList.add('open');
}
function closeAssetModal() { document.getElementById('assetOverlay').classList.remove('open'); }
function saveAsset() {
  const val = parseFloat(document.getElementById('assetInput').value) || 0;
  const note = document.getElementById('assetNote').value.trim();
  const { type, id } = assetEditTarget;
  if (type === 'cash') {
    assets.cash = val;
  } else if (type === 'account') {
    const a = assets.accounts.find(a => a.id === id);
    if (a) { a.balance = val; a.note = note; }
  } else if (type === 'security') {
    const a = assets.securities.find(a => a.id === id);
    if (a) { a.balance = val; a.note = note; }
  } else if (type === 'newaccount') {
    if (!note) return;
    assets.accounts.push({ id: Date.now(), name: note, balance: val, note: '' });
  } else if (type === 'newsecurity') {
    if (!note) return;
    assets.securities.push({ id: Date.now(), name: note, balance: val, note: '' });
  }
  closeAssetModal();
  saveData();
  renderAssetTab();
}
</script>
